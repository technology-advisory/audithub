<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F7FAFF"/><stop offset="100%" stop-color="#EEF4FA"/></linearGradient>
  <linearGradient id="hd" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10294D"/><stop offset="100%" stop-color="#1D4B80"/></linearGradient>
  <filter id="sh"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#A0B1C4" flood-opacity=".16"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#20324D"/></marker>
  <style>
    .box { fill:#fff; stroke:#23384F; stroke-width:2; rx:18; }
    .box2 { fill:#F8FBFF; stroke:#0FA67A; stroke-width:3; rx:18; }
    .title { font: 800 28px Inter,Segoe UI,Arial; fill:#0F172A; }
    .sub { font: 400 18px Inter,Segoe UI,Arial; fill:#4B5C71; }
    .cap { font: 800 16px Inter,Segoe UI,Arial; fill:#fff; }
    .tx { font: 600 18px Inter,Segoe UI,Arial; fill:#283548; }
    .txs { font: 400 16px Inter,Segoe UI,Arial; fill:#55667A; }
    .note { font: 600 16px Inter,Segoe UI,Arial; fill:#0E8B64; }
    .warn { font: 600 16px Inter,Segoe UI,Arial; fill:#D6452F; }
  </style>
</defs>
<rect width="100%" height="100%" fill="url(#bg)"/>
<g filter="url(#sh)"><rect x="30" y="24" width="1540" height="852" rx="34" fill="#fff"/></g>
<rect x="30" y="24" width="1540" height="138" rx="34" fill="url(#hd)"/>
<rect x="30" y="151" width="1540" height="8" fill="#16B5C9"/>
<text x="72" y="88" font-family="Inter,Segoe UI,Arial" font-size="46" font-weight="850" fill="#fff">Acceso administrativo seguro y PAM</text>
<text x="72" y="126" font-family="Inter,Segoe UI,Arial" font-size="21" fill="#D9E7FA">Diseño de demostración · salto controlado, privilegios temporales y registro de sesión</text>

<rect class="box" x="110" y="360" width="250" height="120"/><text class="tx" x="168" y="420">ADMINISTRADOR</text><text class="txs" x="146" y="455">equipo corporativo · EDR</text>
<rect class="box2" x="500" y="170" width="310" height="150"/><text class="tx" x="595" y="236">IDENTIDAD</text><text class="txs" x="555" y="270">MFA resistente · grupos PIM</text>
<rect class="box2" x="500" y="370" width="310" height="160"/><text class="tx" x="568" y="438">PORTAL PAM</text><text class="txs" x="546" y="472">solicitud · aprobación · tiempo</text><text class="txs" x="560" y="500">grabación de sesiones</text>
<rect class="box2" x="500" y="590" width="310" height="140"/><text class="tx" x="555" y="652">BASTIÓN ADMIN</text><text class="txs" x="562" y="686">sin exposición pública</text>

<rect class="box" x="980" y="150" width="430" height="140"/><rect x="980" y="150" width="430" height="48" fill="#11161F"/><text class="cap" x="1118" y="182">PLANO DE GESTIÓN</text><text class="tx" x="1040" y="234">vCenter · Hyper-V · firewalls</text><text class="txs" x="1040" y="265">solo desde bastión</text>
<rect class="box" x="980" y="352" width="430" height="140"/><rect x="980" y="352" width="430" height="48" fill="#11161F"/><text class="cap" x="1125" y="384">SERVIDORES</text><text class="tx" x="1040" y="436">AD · SQL · Ficheros · App</text><text class="txs" x="1040" y="467">RDP/SSH permitido por roles</text>
<rect class="box" x="980" y="554" width="430" height="140"/><rect x="980" y="554" width="430" height="48" fill="#11161F"/><text class="cap" x="1098" y="586">PLATAFORMAS CLOUD</text><text class="tx" x="1040" y="638">Azure · M365 · GitHub</text><text class="txs" x="1040" y="669">access packages · secrets vault</text>

<line x1="360" y1="420" x2="500" y2="420" stroke="#20324D" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="655" y1="320" x2="655" y2="370" stroke="#20324D" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="655" y1="530" x2="655" y2="590" stroke="#20324D" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="810" y1="660" x2="980" y2="624" stroke="#20324D" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="810" y1="660" x2="980" y2="422" stroke="#20324D" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="810" y1="660" x2="980" y2="220" stroke="#20324D" stroke-width="3" marker-end="url(#arrow)"/>
<text class="note" x="400" y="404">inicio de sesión</text><text class="note" x="836" y="644">sesión aprobada</text><text class="warn" x="102" y="808">No se permiten cuentas compartidas ni acceso directo desde el puesto del administrador a los sistemas gestionados.</text>
</svg>